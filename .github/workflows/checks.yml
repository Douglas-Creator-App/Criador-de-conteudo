name: checks

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show status
        shell: pwsh
        run: .\content-agent.cmd status
      - name: Create sample draft
        shell: pwsh
        run: .\content-agent.cmd draft carousel "teste ci"

